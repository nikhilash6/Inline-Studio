# electron-builder packaging config. `npm run build` compiles the app into out/;
# electron-builder then bundles out/ + the production node_modules (including the
# native better-sqlite3 addon) into platform installers under dist/.
appId: com.inlinestudio.app
productName: Inline Studio
directories:
  output: dist
  buildResources: build

# `files` uses negation-only patterns so electron-builder keeps its defaults
# (out/ and production node_modules are included; only source/config is trimmed).
files:
  - '!**/.vscode/*'
  - '!src/**'
  - '!electron/**'
  - '!screenshots/**'
  - '!.claude/**'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc.cjs,eslint.config.js,.prettierrc,.prettierignore,.editorconfig}'
  - '!{.env,.env.*,.npmrc,package-lock.json,pnpm-lock.yaml,yarn.lock}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{README.md,CLAUDE.md,task.md,LICENSE}'

# better-sqlite3 is a native addon: its .node binary must live outside the asar
# archive so the OS loader can dlopen it.
asarUnpack:
  - '**/*.node'
  - 'node_modules/better-sqlite3/**'
  # ffmpeg-static ships an executable that must run from disk, not inside the asar.
  - 'node_modules/ffmpeg-static/**'

mac:
  category: public.app-category.video
  # dmg only; the arch is chosen by the CLI flag (--arm64 / --x64) so each CI job
  # builds exactly one arch. Do NOT pin `arch:` per target here — a pinned arch is
  # not overridden by the CLI flag, so every job would build BOTH archs and the two
  # dmgs would collide on one filename (hdiutil convert then fails).
  target:
    - dmg
  # Unsigned local builds: skip notarization. For distribution, add signing creds.
  identity: null

dmg:
  # ${arch} keeps the arm64 and x64 dmgs from colliding on the same filename.
  artifactName: ${name}-${version}-${arch}.${ext}

win:
  # One x64 installer (covers virtually all Windows PCs).
  target:
    - target: nsis
      arch: x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${name}-${version}-setup.${ext}

linux:
  # One x64 AppImage.
  target:
    - target: AppImage
      arch: x64
  category: AudioVideo
  artifactName: ${name}-${version}.${ext}

# CI publishes installers to this repo's GitHub Releases (as a draft). Local builds
# don't publish unless run with `--publish`.
publish:
  provider: github
  releaseType: draft
